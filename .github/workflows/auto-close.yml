name: auto-close

# Defense-in-depth behind the repo's `collaborators_only` interaction
# limit: any pull request opened by a user outside the sigmacomputing
# maintainer set is immediately commented on, closed, and locked.
# The interaction limit is the primary block (it hides "New PR" from
# non-collaborators); this workflow catches anything that slips through.
#
# Membership is determined via `author_association`:
#   OWNER       — repo owner
#   MEMBER      — org member with *public* membership (private membership
#                 is not reflected here, which is why COLLABORATOR matters)
#   COLLABORATOR — direct repo collaborator (this is the role granted to
#                 maintainers of this mirror; team-based access does NOT
#                 produce COLLABORATOR, so add maintainers as direct
#                 collaborators on the repo)
# Anything else (CONTRIBUTOR, FIRST_TIME_CONTRIBUTOR, NONE) is external.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close-non-org-prs:
    runs-on: ubuntu-latest
    if: ${{ !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) }}
    steps:
      - name: Comment, close, and lock
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr comment "$PR_URL" --body "Hi @$AUTHOR — thanks for the interest, but this repository is a published mirror of skills curated in a private Sigma development repository. Pull requests from outside the maintainer set are not accepted here. For questions, feature requests, or bug reports, please contact Sigma support. This PR will be closed and locked."
          gh pr close "$PR_URL"
          gh pr lock "$PR_URL" --reason resolved
