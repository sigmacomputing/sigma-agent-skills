name: auto-close

# Defense-in-depth behind the repo's `collaborators_only` interaction
# limit: any pull request opened by a user outside the sigmacomputing
# GitHub organization is immediately commented on, closed, and locked.
# The interaction limit is the primary block (it hides "New PR" from
# non-collaborators); this workflow catches anything that slips through.
#
# Membership is determined via `author_association` plus an explicit
# maintainer allowlist. `author_association` reports `MEMBER` only when
# the author's org membership is *public*; private members surface as
# `CONTRIBUTOR`, which would otherwise auto-close legitimate release
# PRs. The allowlist closes that gap without requiring a `read:org` PAT.
#
# Maintainers: add a GitHub login to MAINTAINERS below to authorize
# them to open PRs against this mirror.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close-non-org-prs:
    runs-on: ubuntu-latest
    if: >-
      ${{
        !contains(fromJSON('["MEMBER", "OWNER"]'), github.event.pull_request.author_association) &&
        !contains(fromJSON('["mhseiden"]'), github.event.pull_request.user.login)
      }}
    steps:
      - name: Comment, close, and lock
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr comment "$PR_URL" --body "Hi @$AUTHOR — thanks for the interest, but this repository is a published mirror of skills curated in a private Sigma development repository. Pull requests from outside the maintainer set are not accepted here. For questions, feature requests, or bug reports, please contact Sigma support. This PR will be closed and locked."
          gh pr close "$PR_URL"
          gh pr lock "$PR_URL" --reason resolved
